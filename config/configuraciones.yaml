hostname: "TovARP"

loopbacks:
  - nombre: Loopback101
    ip: 10.10.101.1
    mascara: 255.255.255.255
    descripcion: "TovARP - Router ID OSPF"
  - nombre: Loopback102
    ip: 10.10.102.1
    mascara: 255.255.255.255
    descripcion: "TovARP - Servicios Internos"

interfaces_fisicas:
  - interfaz: GigabitEthernet1
    descripcion: "Enlace WAN DevNet Principal - TovARP"
  - interfaz: GigabitEthernet2
    descripcion: "Enlace LAN Core - TovARP"
  - interfaz: GigabitEthernet3
    descripcion: "Enlace WAN Respaldo - TovARP"

listas_acceso:
  - numero: 100
    reglas:
      - "permit ip host 10.10.101.1 any"
      - "deny ip any any"
  - numero: 101
    reglas:
      - "deny icmp any any"
      - "permit ip any any"

rutas_estaticas:
  - red: 192.168.100.0
    mascara: 255.255.255.0
    siguiente_salto: Null0
  - red: 0.0.0.0
    mascara: 0.0.0.0
    siguiente_salto: 10.255.255.2

ospf:
  proceso: 1
  router_id: "10.10.101.1"
  redes:
    - red: 10.10.0.0
      wildcard: 0.0.255.255
      area: 0
    - red: 192.168.200.0
      wildcard: 0.0.0.255
      area: 1